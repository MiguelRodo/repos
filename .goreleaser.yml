project_name: repos

builds:
  - id: repos-linux
    main: ./cmd/repos
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: repos-windows
    main: ./cmd/repos
    goos:
      - windows
    goarch:
      - amd64
      - arm64

nfpms:
  - id: repos
    formats:
    - deb
    package_name: repos
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    homepage: "https://github.com/MiguelRodo/repos"
    description: "Cross-platform CLI for managing multiple related Git repositories as a unified workspace"
    license: "MIT"
    maintainer: "Miguel Rodo"
    bindir: /usr/bin
    builds:
      - repos-linux

archives:
  - id: tarballs
    format: tar.gz
  - id: binaries
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
