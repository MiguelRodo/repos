name: Version and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >
          Exact version to apply to all packages (e.g. 1.2.3).
          Overridden per-package by cli_version, python_version, or r_version.
          Cannot be set together with bump_type.
        required: false
      bump_type:
        description: >
          Version component to bump (major | minor | patch).
          If specified, bumps all versions that are unspecified below.
          Cannot be set together with version.
        required: false
      cli_version:
        description: >
          Override: exact version to set for the CLI (e.g. 1.2.3).
        required: false
      python_version:
        description: >
          Override: exact version to set for the Python package (e.g. 1.2.3).
        required: false
      r_version:
        description: >
          Override: exact version to set for the R package (e.g. 1.2.3).
        required: false

jobs:
  build-deb:
    runs-on: ubuntu-latest
    env:
      IS_RELEASE: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts build-essential dpkg-dev gnupg apt-utils

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_INPUT="${{ inputs.cli_version }}"
            BUMP_INPUT="${{ inputs.bump_type }}"
            VERSION_INPUT="${{ inputs.version }}"

            # version and bump_type are mutually exclusive
            if [ -n "$VERSION_INPUT" ] && [ -n "$BUMP_INPUT" ]; then
              echo "Error: cannot set both 'version' and 'bump_type'." >&2
              exit 1
            fi

            # cli_version and bump_type are mutually exclusive
            if [ -n "$TAG_INPUT" ] && [ -n "$BUMP_INPUT" ]; then
              echo "Error: cannot set both 'cli_version' and 'bump_type'." >&2
              exit 1
            fi

            # Must have at least one way to determine the version
            if [ -z "$TAG_INPUT" ] && [ -z "$BUMP_INPUT" ] && [ -z "$VERSION_INPUT" ]; then
              echo "Error: provide one of 'version', 'cli_version', or 'bump_type' (major/minor/patch)." >&2
              exit 1
            fi

            if [ -n "$BUMP_INPUT" ]; then
              # Bump mode: derive current version from latest semver git tag
              PREV_TAG=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | tail -1)
              CURRENT="${PREV_TAG#v}"
              if [ -z "$CURRENT" ]; then
                CURRENT="0.0.0"
              fi
              IFS='.' read -r cur_major cur_minor cur_patch <<< "$CURRENT"
              cur_major="${cur_major:-0}"; cur_minor="${cur_minor:-0}"; cur_patch="${cur_patch:-0}"
              case "$BUMP_INPUT" in
                major) VERSION="$((cur_major + 1)).0.0" ;;
                minor) VERSION="${cur_major}.$((cur_minor + 1)).0" ;;
                patch) VERSION="${cur_major}.${cur_minor}.$((cur_patch + 1))" ;;
                *)
                  echo "Error: bump_type must be major, minor, or patch. Got: '$BUMP_INPUT'" >&2
                  exit 1
                  ;;
              esac
            else
              # Explicit version mode: cli_version takes priority over version
              EFFECTIVE="${TAG_INPUT:-$VERSION_INPUT}"
              VERSION="${EFFECTIVE#v}"
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            echo "This workflow only runs for tags or manual runs with cli_version/bump_type." >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            echo "Error: version '$VERSION' does not start with a digit." >&2
            exit 1
          fi
          TAG="v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Determine CLI bump type
        id: determine_bump_type
        run: |
          # If bump_type was explicitly supplied, use it directly.
          if [ -n "${{ inputs.bump_type }}" ]; then
            BUMP_TYPE="${{ inputs.bump_type }}"
          else
            # Derive bump type by comparing the new version with the most recent
            # previous semver git tag.
            NEW_VERSION="${{ steps.get_version.outputs.version }}"
            NEW_TAG="v${NEW_VERSION}"

            # All semver-like tags sorted by version, excluding the new one
            PREV_TAG=$(git tag --sort=version:refname \
              | grep -E '^v[0-9]+\.[0-9]' \
              | grep -vF "$NEW_TAG" \
              | tail -1)

            if [ -z "$PREV_TAG" ]; then
              BUMP_TYPE="patch"
            else
              PREV_VERSION="${PREV_TAG#v}"
              IFS='.' read -r prev_major prev_minor prev_patch <<< "$PREV_VERSION"
              IFS='.' read -r new_major new_minor new_patch <<< "$NEW_VERSION"
              prev_major="${prev_major:-0}"; prev_minor="${prev_minor:-0}"; prev_patch="${prev_patch:-0}"
              new_major="${new_major:-0}";  new_minor="${new_minor:-0}";  new_patch="${new_patch:-0}"
              if [ "$new_major" -gt "$prev_major" ]; then
                BUMP_TYPE="major"
              elif [ "$new_minor" -gt "$prev_minor" ]; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi
            fi
          fi

          echo "bump_type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Bump type: ${BUMP_TYPE}"

      - name: Compute wrapper versions
        id: compute_versions
        run: |
          BUMP_TYPE="${{ steps.determine_bump_type.outputs.bump_type }}"
          # Strip leading 'v' from the global version input once for reuse below
          GLOBAL_VERSION="${{ inputs.version }}"
          GLOBAL_VERSION="${GLOBAL_VERSION#v}"

          # --- Python ---
          if [ -n "${{ inputs.python_version }}" ]; then
            NEW_PY_VERSION="${{ inputs.python_version }}"
          elif [ -n "$GLOBAL_VERSION" ]; then
            NEW_PY_VERSION="$GLOBAL_VERSION"
          else
            CURRENT_PY=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | tr -d '[:space:]')
            IFS='.' read -r py_major py_minor py_patch <<< "$CURRENT_PY"
            py_major="${py_major:-0}"; py_minor="${py_minor:-0}"; py_patch="${py_patch:-0}"
            case "$BUMP_TYPE" in
              major) NEW_PY_VERSION="$((py_major + 1)).0.0" ;;
              minor) NEW_PY_VERSION="${py_major}.$((py_minor + 1)).0" ;;
              *)     NEW_PY_VERSION="${py_major}.${py_minor}.$((py_patch + 1))" ;;
            esac
          fi

          # --- R ---
          if [ -n "${{ inputs.r_version }}" ]; then
            NEW_R_VERSION="${{ inputs.r_version }}"
          elif [ -n "$GLOBAL_VERSION" ]; then
            NEW_R_VERSION="$GLOBAL_VERSION"
          else
            CURRENT_R=$(sed -n 's/^Version: \(.*\)/\1/p' DESCRIPTION | tr -d '[:space:]')
            IFS='.' read -r r_major r_minor r_patch <<< "$CURRENT_R"
            r_major="${r_major:-0}"; r_minor="${r_minor:-0}"; r_patch="${r_patch:-0}"
            case "$BUMP_TYPE" in
              major) NEW_R_VERSION="$((r_major + 1)).0.0" ;;
              minor) NEW_R_VERSION="${r_major}.$((r_minor + 1)).0" ;;
              *)     NEW_R_VERSION="${r_major}.${r_minor}.$((r_patch + 1))" ;;
            esac
          fi

          echo "python_version=${NEW_PY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "r_version=${NEW_R_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Python wrapper → ${NEW_PY_VERSION}"
          echo "R wrapper      → ${NEW_R_VERSION}"

      - name: Update changelog with version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          DATE=$(date -R)
          # use printf so no leading spaces are inserted
          printf "repos (%s) unstable; urgency=medium\n\n  * Release version %s\n\n -- Miguel Rodo <miguel.rodo@uct.ac.za>  %s\n" "$VERSION" "$VERSION" "$DATE" > debian/changelog

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          cp -v ../*.deb ./

      - name: List built packages
        run: |
          ls -lh ./*.deb

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}
          files: ./*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish to apt-miguelrodo ──────────────────────────────
      - name: Checkout apt-miguelrodo
        if: env.IS_RELEASE == 'true'
        uses: actions/checkout@v4
        with:
          repository: MiguelRodo/apt-miguelrodo
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Import GPG private key (isolated)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="$(mktemp -d)"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # show imported fingerprint for verification (safe)
          gpg --list-secret-keys --with-colons | sed -n 's/^fpr:://p' || true
          # keep GNUPGHOME set for subsequent steps in this job
          echo "GNUPGHOME=$GNUPGHOME" >> $GITHUB_ENV

      - name: Update APT repository
        if: env.IS_RELEASE == 'true'
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cp ./*.deb apt-repo/
          cd apt-repo
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -k -f Packages
          apt-ftparchive release . > Release
          # use GNUPGHOME from env; sign with fingerprint securely via stdin
          if [ -n "$GPG_PASSPHRASE" ]; then
            # pass the passphrase on stdin to avoid putting it on the command line
            printf '%s' "$GPG_PASSPHRASE" | \
              gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                  --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release

            printf '%s' "$GPG_PASSPHRASE" | \
              gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                  --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release
          else
            gpg --batch --yes --pinentry-mode loopback \
                --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release

            gpg --batch --yes --pinentry-mode loopback \
                --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release
          fi

      - name: Push to apt-miguelrodo
        if: env.IS_RELEASE == 'true'
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update repos package to ${{ steps.get_version.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Checkout default branch for README update
        if: env.IS_RELEASE == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: self-repo

      - name: Update README and wrapper versions
        if: env.IS_RELEASE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PY_VERSION="${{ steps.compute_versions.outputs.python_version }}"
          R_VERSION="${{ steps.compute_versions.outputs.r_version }}"
          cd self-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update README install version
          sed -i -E "s/^VERSION_REPOS=.*/VERSION_REPOS=${VERSION}/" README.md

          # Update Python wrapper version
          sed -i "s/^version = \"[^\"]*\"/version = \"${PY_VERSION}\"/" pyproject.toml

          # Update Python bundled CLI version
          sed -i "s/^_BUNDLED_CLI_VERSION = \"[^\"]*\"/_BUNDLED_CLI_VERSION = \"${VERSION}\"/" src/repos/__init__.py

          # Update R wrapper version
          sed -i "s/^Version: .*/Version: ${R_VERSION}/" DESCRIPTION

          # Update R bundled CLI version
          sed -i "s/^\.bundled_cli_version <- \"[^\"]*\"/.bundled_cli_version <- \"${VERSION}\"/" R/wrappers.R

          if git diff --quiet -- README.md pyproject.toml DESCRIPTION src/repos/__init__.py R/wrappers.R; then
            echo "All versions already up to date."
            exit 0
          fi

          git add README.md pyproject.toml DESCRIPTION src/repos/__init__.py R/wrappers.R
          git commit -m "Bump versions: CLI ${VERSION}, Python ${PY_VERSION}, R ${R_VERSION}"
          git push origin "${{ github.event.repository.default_branch }}"

      - name: Cleanup GPG home
        if: always()
        run: |
          # remove temporary GNUPGHOME (if set) and clear the env var for subsequent steps
          if [ -n "${GNUPGHOME:-}" ] && [ -d "$GNUPGHOME" ]; then
            rm -rf "$GNUPGHOME" || true
          fi
          echo "GNUPGHOME=" >> $GITHUB_ENV
