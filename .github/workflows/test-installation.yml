name: Test Installation Methods

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Test Python package installation
  test-python-package:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.8', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y git curl
          fi
      
      - name: Install Python package
        run: |
          pip install .
          echo "Installation completed"
      
      - name: Test Python API
        run: |
          python -c "from repos import clone, workspace, codespace, run; print('Python API works')"
          echo "Python package installation test passed"

  # Test R package installation
  test-r-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git \
            curl \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev
  
      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::roxygen2
          needs: |
            devtools
      
      - name: Build and install R package
        run: |
          Rscript -e 'devtools::install(".")'
      
      - name: Test R package
        run: |
          Rscript -e 'library(repos); repos("--help")'
          echo "R package installation test passed"

  # Test Debian package installation
  test-debian-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: '~> v2'
      
      - name: Build Debian package
        run: |
          goreleaser release --snapshot --clean
      
      - name: Install Debian package
        run: |
          sudo dpkg -i dist/*.deb || true
          sudo apt-get install -f -y
      
      - name: Verify repos command is available
        run: |
          which repos
          repos --help || true
          echo "repos command is available"
      
  # Test local installation (Ubuntu without sudo)
  test-local-installation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl bash
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      
      - name: Build fake release binary
        run: |
          mkdir -p /tmp/fake-release
          cd cmd/repos
          GOOS=linux GOARCH=amd64 go build -o /tmp/fake-release/repos_linux_amd64 .

      - name: Run local installation script
        env:
          REPOS_DOWNLOAD_BASE_URL: "file:///tmp/fake-release"
        run: |
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          bash install-local.sh

      - name: Verify repos command is available
        run: |
          which repos
          repos --help || true
          echo "repos command is available"
      
      - name: Verify script installation
        run: |
          test -f $HOME/.local/bin/repos || exit 1
          test -x $HOME/.local/bin/repos || exit 1
          echo "Local installation test passed"
      
      - name: Test repos functionality
        run: |
          # Create a test repos.list file
          echo "# Test file" > test-repos.list
          # Test that repos command works
          repos --help || true
          echo "repos functionality works"
      
      - name: Test uninstall
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          bash uninstall-local.sh
          if [ -f $HOME/.local/bin/repos ]; then
            echo "Error: repos command not removed"
            exit 1
          fi
          echo "Uninstallation successful"

  # Test installation from published APT repository
  test-apt-repo-installation:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install APT repository prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gpg

      - name: Add MiguelRodo APT repository
        run: |
          curl -fsSL https://miguelrodo.github.io/apt-miguelrodo/KEY.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/apt-miguelrodo.gpg
          echo "deb [signed-by=/usr/share/keyrings/apt-miguelrodo.gpg] https://miguelrodo.github.io/apt-miguelrodo stable main" \
            | sudo tee /etc/apt/sources.list.d/apt-miguelrodo.list >/dev/null

      - name: Install repos from APT
        run: |
          sudo apt-get update
          sudo apt-get install -y repos

      - name: Verify installed binary and architecture
        run: |
          repos --help
          PKG_ARCH="$(dpkg-query -W -f='${Architecture}' repos)"
          HOST_ARCH="$(dpkg --print-architecture)"
          if [ "$PKG_ARCH" = "all" ]; then
            echo "Error: expected architecture-specific package, got Architecture: all"
            exit 1
          fi
          if [ "$PKG_ARCH" != "$HOST_ARCH" ]; then
            echo "Error: installed package architecture ($PKG_ARCH) does not match host ($HOST_ARCH)"
            exit 1
          fi
          echo "Installed package architecture: $PKG_ARCH"
          echo "APT repository installation test passed"

  # Test Windows manual installation
  test-windows-manual:
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      
      - name: Build fake release binary
        shell: pwsh
        run: |
          $fakeRelease = Join-Path $env:TEMP "fake-release"
          New-Item -ItemType Directory -Path $fakeRelease -Force | Out-Null
          Set-Location cmd/repos
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -o (Join-Path $fakeRelease "repos_windows_amd64.exe") .
          Write-Host "Fake release binary built"
      
      - name: Run install.ps1
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE ".local\bin"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          $env:Path = "$installDir;$env:Path"
          $fakeRelease = Join-Path $env:TEMP "fake-release"
          $env:REPOS_DOWNLOAD_BASE_URL = "file:///$($fakeRelease -replace '\\', '/')"
          .\install.ps1
          Write-Host "Installation script executed"
      
      - name: Verify repos is in PATH (new session)
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE ".local\bin"
          $env:Path = "$installDir;$env:Path"
          if (Test-Path (Join-Path $installDir "repos.exe")) {
            Write-Host "repos.exe installed to writable PATH directory"
          } else {
            Write-Error "repos.exe not found in expected install directory"
            exit 1
          }
      
      - name: Test repos command
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE ".local\bin"
          $env:Path = "$installDir;$env:Path"
          & (Join-Path $installDir "repos.exe") --help
          Write-Host "Windows manual installation test passed"

  # Test from source (Go binary)
  test-from-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl
      
      - name: Build repos binary from source
        run: |
          cd cmd/repos
          go build -o /tmp/repos .
          /tmp/repos --help
          echo "From source binary test passed"

  # Summary job to ensure all tests pass
  test-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test-python-package, test-r-package, test-debian-package, test-local-installation, test-apt-repo-installation, test-windows-manual, test-from-source]
    if: always()
    
    steps:
      - name: Check all tests passed
        run: |
          if [ "${{ needs.test-python-package.result }}" != "success" ]; then
            echo "Python package tests failed"
            exit 1
          fi
          if [ "${{ needs.test-r-package.result }}" != "success" ]; then
            echo "R package tests failed"
            exit 1
          fi
          if [ "${{ needs.test-debian-package.result }}" != "success" ]; then
            echo "Debian package tests failed"
            exit 1
          fi
          if [ "${{ needs.test-local-installation.result }}" != "success" ]; then
            echo "Local installation tests failed"
            exit 1
          fi
          if [ "${{ needs.test-apt-repo-installation.result }}" != "success" ]; then
            echo "APT repository installation tests failed"
            exit 1
          fi
          if [ "${{ needs.test-windows-manual.result }}" != "success" ]; then
            echo "Windows manual tests failed"
            exit 1
          fi
          if [ "${{ needs.test-from-source.result }}" != "success" ]; then
            echo "From source tests failed"
            exit 1
          fi
          echo "✅ All installation methods tested successfully!"
